<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Tuanjie WebGL Player | plane attack</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #tuanjie-canvas {
            display: block;
            background: #231F20;
        }
    </style>
</head>
<body>
    <canvas id="tuanjie-canvas" width="540" height="960" tabindex="-1"></canvas>

    <script src="Build/web_3.loader.js"></script>
    <script>
        var canvas = document.querySelector("#tuanjie-canvas");

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            var meta = document.createElement('meta');
            meta.name = 'viewport';
            meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
            document.getElementsByTagName('head')[0].appendChild(meta);

            canvas.style.position = "fixed";
            canvas.style.top = "0";
            canvas.style.left = "0";
            canvas.style.width = "100vw";
            canvas.style.height = "100vh";
            document.body.style.display = "block";
        }

        createTuanjieInstance(canvas, {
            dataUrl: "Build/web_3.data.unityweb",
            frameworkUrl: "Build/web_3.framework.js.unityweb",
            codeUrl: "Build/web_3.wasm.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "zpcompany",
            productName: "plane attack",
            productVersion: "0.1",
        });
    </script>
</body>
</html>
