<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Tuanjie WebGL Player | plane attack</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #tuanjie-canvas {
            display: block;
            background: #231F20;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            transition: opacity 0.4s ease-out;
            pointer-events: none;
        }
        .progress-container {
            width: 280px;
            max-width: 70vw;
            background-color: rgba(40, 40, 50, 0.8);
            border-radius: 40px;
            padding: 3px;
            box-shadow: 0 0 12px rgba(0, 200, 255, 0.3);
            backdrop-filter: blur(2px);
        }
        .progress-bar {
            width: 0%;
            height: 12px;
            background: linear-gradient(90deg, #3a8cff, #00d4ff);
            border-radius: 40px;
            transition: width 0.2s ease-out;
            box-shadow: 0 0 4px #00a6ff;
        }
        .loading-text {
            margin-top: 20px;
            color: #e0e0e0;
            font-size: 16px;
            letter-spacing: 1px;
            font-weight: 500;
            text-shadow: 0 0 4px #00a6ff;
        }
        .loading-percent {
            font-weight: bold;
            color: #3a8cff;
        }
        .loading-overlay.hide {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s, visibility 0s 0.4s;
        }
        @media (max-width: 768px) {
            .progress-container {
                width: 240px;
            }
            .loading-text {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <canvas id="tuanjie-canvas" width="540" height="960" tabindex="-1"></canvas>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="progress-container">
            <div id="progressBarFill" class="progress-bar"></div>
        </div>
        <div class="loading-text">
            Loading assets... <span id="loadingPercent" class="loading-percent">0</span>%
        </div>
    </div>

    <script src="Build/web_3.loader.js"></script>
    <script>
        var canvas = document.querySelector("#tuanjie-canvas");

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            var meta = document.createElement('meta');
            meta.name = 'viewport';
            meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
            document.getElementsByTagName('head')[0].appendChild(meta);

            canvas.style.position = "fixed";
            canvas.style.top = "0";
            canvas.style.left = "0";
            canvas.style.width = "100vw";
            canvas.style.height = "100vh";
            document.body.style.display = "block";
        }

        const loadingOverlay = document.getElementById('loadingOverlay');
        const progressFill = document.getElementById('progressBarFill');
        const percentSpan = document.getElementById('loadingPercent');

        function updateProgress(percentDecimal) {
            if (!progressFill || !percentSpan) return;
            let percent = Math.floor(percentDecimal * 100);
            if (percent > 100) percent = 100;
            if (percent < 0) percent = 0;
            progressFill.style.width = percent + '%';
            percentSpan.innerText = percent;
        }

        function finishLoading() {
            if (loadingOverlay) {
                loadingOverlay.classList.add('hide');
            }
        }

        const gameConfig = {
            dataUrl: "Build/web_3.data.unityweb",
            frameworkUrl: "Build/web_3.framework.js.unityweb",
            codeUrl: "Build/web_3.wasm.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "zpcompany",
            productName: "plane attack",
            productVersion: "0.1",
        };

        function onProgress(progress) {
            if (progress >= 0 && progress <= 1) {
                updateProgress(progress);
            }
        }

        let gameInstancePromise;
        try {
            gameInstancePromise = createTuanjieInstance(canvas, gameConfig, onProgress);
            
            if (gameInstancePromise && typeof gameInstancePromise.then === 'function') {
                gameInstancePromise.then(function(instance) {
                    finishLoading();
                }).catch(function(error) {
                    finishLoading();
                });
            } else {
                fallbackHideOnModuleReady();
            }
        } catch (err) {
            finishLoading();
        }

        function fallbackHideOnModuleReady() {
            let checkInterval = setInterval(function() {
                if (window.Module && window.Module.canvas && typeof window.Module.setStatus === 'function') {
                    if (window.Module.calledRun === true || (window.Module.preRun && window.Module.preRunFinished)) {
                        clearInterval(checkInterval);
                        finishLoading();
                    }
                }
            }, 200);
            setTimeout(function() {
                clearInterval(checkInterval);
                finishLoading();
            }, 30000);
        }

        let alreadyFinished = false;
        const superUpdateProgress = function(percentDecimal) {
            if (!progressFill || !percentSpan) return;
            let percent = Math.floor(percentDecimal * 100);
            if (percent > 100) percent = 100;
            if (percent < 0) percent = 0;
            progressFill.style.width = percent + '%';
            percentSpan.innerText = percent;
            if (!alreadyFinished && percentDecimal >= 0.99) {
                if (percent >= 100 || percentDecimal >= 1.0) {
                    alreadyFinished = true;
                    setTimeout(() => finishLoading(), 300);
                }
            }
        };
    </script>
</body>
</html>
