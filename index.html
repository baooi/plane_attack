<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Tuanjie WebGL Player | plane attack</title>
    <style>
      /* 加载进度条样式 */
      #loading-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #231F20;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }
      #loading-bar-bg {
        width: 280px;
        height: 12px;
        background: #444;
        border-radius: 6px;
        overflow: hidden;
      }
      #loading-bar {
        height: 100%;
        width: 0%;
        background: #42b983;
        transition: width 0.2s ease;
      }
      #loading-text {
        color: white;
        font-size: 14px;
        margin-top: 10px;
      }
      /* 核心：让游戏画布居中 */
      #tuanjie-canvas {
        display: block;
        margin: 0 auto;
        background: #231F20;
      }
    </style>
  </head>
  <body style="text-align: center; padding: 0; border: 0; margin: 0;">
    <!-- 加载界面 -->
    <div id="loading-container">
      <div id="loading-bar-bg">
        <div id="loading-bar"></div>
      </div>
      <div id="loading-text">游戏加载中 0%</div>
    </div>

    <canvas id="tuanjie-canvas" width=540 height=960 tabindex="-1"></canvas>

    <script src="Build/web_3.loader.js"></script>
    <script>
      var loadingBar = document.getElementById("loading-bar");
      var loadingText = document.getElementById("loading-text");
      var loadingContainer = document.getElementById("loading-container");
      var canvas = document.querySelector("#tuanjie-canvas");

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";
        canvas.style.top = "0";
        canvas.style.left = "0";
        document.body.style.textAlign = "left";
      }

      createTuanjieInstance(canvas, {
        dataUrl: "Build/web_3.data.unityweb",
        frameworkUrl: "Build/web_3.framework.js.unityweb",
        codeUrl: "Build/web_3.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "zpcompany",
        productName: "plane attack",
        productVersion: "0.1",
      },
      // 进度回调
      function (progress) {
        var percent = Math.floor(progress * 100);
        loadingBar.style.width = percent + "%";
        loadingText.innerText = "游戏加载中 " + percent + "%";

        if (progress >= 1) {
          loadingContainer.style.display = "none";
          canvas.style.display = "block";
        }
      });
    </script>
  </body>
</html>
